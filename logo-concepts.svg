<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" width="500" height="280" style="background:#1a1a1a;">

  <!-- ══════════════════════════════════════════════════ -->
  <!-- Concept 1 refined: Sine wave through maple leaf   -->
  <!-- ══════════════════════════════════════════════════ -->

  <!-- Version A: Sine wave overlaid on leaf -->
  <text x="125" y="25" fill="#aaa" font-size="11" text-anchor="middle" font-family="Arial">Sine through leaf</text>
  <g transform="translate(55, 38)">
    <!-- Maple leaf (solid, visible) -->
    <path d="M70 6 L64 22 L55 18 L59 30 L38 34 L46 48 L40 62 L54 58 L53 74 L70 68 L87 74 L86 58 L100 62 L94 48 L102 34 L81 30 L85 18 L76 22 Z" fill="white" opacity="0.18"/>
    <!-- Stem -->
    <line x1="70" y1="74" x2="70" y2="92" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <!-- Smooth sine wave cutting through leaf horizontally -->
    <path d="M20,50 C27,50 30,30 37,30 C44,30 47,70 54,70 C61,70 64,30 71,30 C78,30 81,70 88,70 C95,70 98,30 105,30 C112,30 115,50 120,50"
      fill="none" stroke="#c8411a" stroke-width="2.8" stroke-linecap="round"/>
  </g>
  <text x="125" y="165" fill="white" font-size="14" text-anchor="middle" font-weight="bold" font-family="Arial">Maple</text>
  <text x="125" y="182" fill="#c8411a" font-size="14" text-anchor="middle" font-weight="bold" font-family="Arial">Sensors</text>

  <!-- Divider -->
  <line x1="250" y1="20" x2="250" y2="195" stroke="#333" stroke-width="1"/>

  <!-- Version B: Sine wave, leaf fades at wave midline -->
  <text x="375" y="25" fill="#aaa" font-size="11" text-anchor="middle" font-family="Arial">Wave-clipped leaf</text>
  <g transform="translate(305, 38)">
    <!-- Upper half of maple leaf (above wave) -->
    <clipPath id="topHalf">
      <rect x="0" y="0" width="140" height="50"/>
    </clipPath>
    <clipPath id="bottomHalf">
      <rect x="0" y="50" width="140" height="60"/>
    </clipPath>
    <!-- Leaf top half — bright -->
    <path d="M70 6 L64 22 L55 18 L59 30 L38 34 L46 48 L40 62 L54 58 L53 74 L70 68 L87 74 L86 58 L100 62 L94 48 L102 34 L81 30 L85 18 L76 22 Z"
      fill="white" opacity="0.7" clip-path="url(#topHalf)"/>
    <!-- Leaf bottom half — dimmed -->
    <path d="M70 6 L64 22 L55 18 L59 30 L38 34 L46 48 L40 62 L54 58 L53 74 L70 68 L87 74 L86 58 L100 62 L94 48 L102 34 L81 30 L85 18 L76 22 Z"
      fill="white" opacity="0.12" clip-path="url(#bottomHalf)"/>
    <!-- Stem -->
    <line x1="70" y1="74" x2="70" y2="92" stroke="white" stroke-width="3" stroke-linecap="round" opacity="0.25"/>
    <!-- Smooth sine wave — the dividing line -->
    <path d="M15,50 C22,50 25,28 33,28 C41,28 44,72 52,72 C60,72 63,28 71,28 C79,28 82,72 90,72 C98,72 101,28 109,28 C117,28 120,50 125,50"
      fill="none" stroke="#c8411a" stroke-width="3" stroke-linecap="round"/>
    <!-- Glow effect on wave -->
    <path d="M15,50 C22,50 25,28 33,28 C41,28 44,72 52,72 C60,72 63,28 71,28 C79,28 82,72 90,72 C98,72 101,28 109,28 C117,28 120,50 125,50"
      fill="none" stroke="#c8411a" stroke-width="8" stroke-linecap="round" opacity="0.15"/>
  </g>
  <text x="375" y="165" fill="white" font-size="14" text-anchor="middle" font-weight="bold" font-family="Arial">Maple</text>
  <text x="375" y="182" fill="#c8411a" font-size="14" text-anchor="middle" font-weight="bold" font-family="Arial">Sensors</text>

  <!-- Bottom note -->
  <text x="250" y="230" fill="#666" font-size="10" text-anchor="middle" font-family="Arial">Both use smooth continuous sine wave — accurate for acoustic sensor signals</text>

</svg>
